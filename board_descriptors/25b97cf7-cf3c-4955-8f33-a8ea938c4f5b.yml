    io_interface: raspberrypi5gpio
    io_pin_spec: 21
    target_pin_function: BUTTON1
    target_pin_mode: input
    target_pin_active: low
  P0.12:
    io_interface: raspberrypi5gpio
    io_pin_spec: 26
    target_pin_function: BUTTON2
    target_pin_mode: input
    target_pin_active: low
